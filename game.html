<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HEGEMON — Table Mode</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="game-body">
  <main class="map-pane">
    <svg id="map" aria-label="Campaign map"></svg>
    <div id="zoom-controls">
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="zoom-out" title="Zoom out">−</button>
      <button id="zoom-home" title="Fit whole map">⌂</button>
    </div>
  </main>
  <div id="stage" aria-live="polite"></div>
  <aside class="side">
    <header>
      <h1>Hegemon</h1>
      <p id="status-line"></p>
      <div id="vitals-panel"></div>
      <div id="tracks-panel"></div>
      <div id="houses-panel"></div>
    </header>
    <div class="field">
      <label for="theme-select">Theme pack</label>
      <select id="theme-select">
        <option value="core" selected>Core — The Sundered Realm</option>
        <option value="asoiaf">ASOIAF — The War of Five Kings</option>
        <option value="modern2026">2026 — The Concert of Powers</option>
      </select>
    </div>
    <section id="turn-panel"></section>
    <details id="inspector-panel">
      <summary>Seat inspector</summary>
      <div id="inspector-body"></div>
    </details>
    <section id="log-panel">
      <h3>Chronicle</h3>
      <div id="log"></div>
    </section>
    <div class="toolbar">
      <button id="btn-new">New game</button>
      <button id="btn-undo">Undo</button>
      <button id="btn-save">Save</button>
      <button id="btn-episode" title="Export a labeled learning episode (transcript + outcome)">Episode</button>
      <button id="btn-load">Load</button>
      <select id="spectate-policy" title="Bot policy for spectate seats">
        <option value="heuristic" selected>heuristic bots</option>
        <option value="random">random bots</option>
      </select>
      <button id="btn-spectate" title="Bots play every seat">Spectate</button>
      <input id="spectate-speed" type="range" min="120" max="2000" step="40" value="600"
        title="Spectate speed (ms per decision)"/>
      <button id="btn-quiet" title="Quiet mode: event reveals go to the Chronicle only, no stage cards">Quiet: off</button>
    </div>
    <div id="load-box" class="hidden">
      <button id="btn-load-file">Load a save file…</button>
      <input type="file" id="load-file" accept="application/json,.json" hidden>
      <textarea id="load-text" rows="4" placeholder="…or paste a saved game here"></textarea>
      <button id="btn-load-confirm">Restore</button>
    </div>
    <div id="seed-line" title="Tap to start a seeded game"></div>
    <p class="footnote"><a href="index.html">Map atlas & setup reference →</a></p>
  </aside>
  <script type="module" src="src/game/app.js"></script>
</body>
</html>
