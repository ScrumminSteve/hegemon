<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HEGEMON — Table Mode (preview build)</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>/* HEGEMON map viewer — naval chart-room aesthetic.
   Palette: ink #0B111C · sea #14283C · slate #37424F · brass #C9A84C · bone #D9D2C0 */

:root {
  --ink: #0B111C;
  --ink-2: #101a29;
  --sea: #14283C;
  --slate: #37424F;
  --slate-2: #2C3641;
  --brass: #C9A84C;
  --bone: #D9D2C0;
  --bone-dim: #9aa3ad;
  --hair: rgba(217, 210, 192, 0.14);
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--ink);
  color: var(--bone);
  font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: 100vh;
}

.map-pane { overflow: auto; background: radial-gradient(1200px 900px at 40% 30%, var(--ink-2), var(--ink)); }
#map { display: block; width: min(100%, 980px); margin: 0 auto; height: auto; }

.side {
  border-left: 1px solid var(--hair);
  background: var(--ink-2);
  padding: 20px 22px;
  overflow-y: auto;
}

header h1 {
  font-family: "Big Shoulders Display", "Arial Narrow", system-ui, sans-serif;
  font-weight: 700; letter-spacing: 0.12em; font-size: 26px;
  margin: 0; color: var(--brass); text-transform: uppercase;
}
#theme-title { margin: 2px 0 16px; color: var(--bone-dim); font-size: 13px; letter-spacing: 0.06em; }

.field label { display: block; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--bone-dim); margin-bottom: 6px; }
select {
  width: 100%; padding: 9px 10px; border-radius: 4px;
  background: var(--slate-2); color: var(--bone);
  border: 1px solid var(--hair); font: inherit;
}
select:focus-visible, .chip:focus-visible, .region:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }

.field-toggle { margin-top: 14px; }
.toggle-label { display: flex; align-items: center; gap: 8px; font-size: 13.5px; color: var(--bone); text-transform: none; letter-spacing: 0; cursor: pointer; }
.toggle-label input { accent-color: var(--brass); }
.ov-garrison { fill: var(--ink-2); stroke-width: 2; }
.ov-neutral { fill: var(--ink-2); stroke: var(--bone-dim); stroke-width: 2; stroke-dasharray: 3 2; }
.ov-num { fill: var(--bone); text-anchor: middle; font: 600 11px "IBM Plex Mono", ui-monospace, monospace; }
.setup-overlay { pointer-events: none; }

#inspector { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--hair); min-height: 220px; }
.hint { color: var(--bone-dim); font-size: 13.5px; }
.insp-head h2 { margin: 4px 0 10px; font-family: "Big Shoulders Display", "Arial Narrow", sans-serif; font-size: 24px; letter-spacing: .04em; }
.idtag-ui, .draft-flag { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 11px; color: var(--brass); letter-spacing: .08em; }
.draft-flag { color: #c96a2b; text-transform: uppercase; }
dl { display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; margin: 0 0 14px; font-size: 13.5px; }
dt { color: var(--bone-dim); }
dd { margin: 0; }
#inspector h3 { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--bone-dim); margin: 12px 0 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font: 12px/1 "IBM Plex Mono", ui-monospace, monospace; color: var(--bone);
  background: var(--slate-2); border: 1px solid var(--hair); border-radius: 999px;
  padding: 6px 10px; cursor: pointer;
}
.chip:hover { border-color: var(--brass); }

#legend { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--hair); font-size: 13px; }
.legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.swatch { width: 12px; height: 12px; border-radius: 2px; flex: none; }
.legend-home { margin-left: auto; color: var(--bone-dim); font-size: 12px; }

/* ---- SVG ---- */
.graticule line { stroke: var(--hair); stroke-width: 0.5; }
.edge-land { stroke: rgba(217,210,192,.28); stroke-width: 1.4; }
.edge-sea  { stroke: rgba(120,170,210,.30); stroke-width: 1.4; stroke-dasharray: 4 5; }
.edge-hl   { stroke: var(--brass); stroke-width: 2.4; stroke-dasharray: none; }

.region { cursor: pointer; transition: opacity .12s ease; }
.region.dim { opacity: 0.28; }
.land-hex { fill: var(--slate); stroke: rgba(217,210,192,.45); stroke-width: 1.6; }
.sea-outer { fill: var(--sea); stroke: rgba(120,170,210,.5); stroke-width: 1.2; stroke-dasharray: 3 4; }
.sea-inner { fill: none; stroke: rgba(120,170,210,.28); stroke-width: 1; }
.port-diamond { fill: var(--ink-2); stroke: var(--brass); stroke-width: 1.4; }

.region.hl .shape, .region.selected .shape { stroke: var(--brass); stroke-width: 3; }
.region.adj .shape { stroke: #E8DCA8; stroke-width: 2.4; }

.label {
  fill: var(--bone); text-anchor: middle;
  font: 600 15px "Big Shoulders Display", "Arial Narrow", sans-serif;
  letter-spacing: .05em; paint-order: stroke; stroke: var(--ink); stroke-width: 3px;
}
.maritime .label { fill: #9CC3DE; font-weight: 500; font-style: italic; }
.idtag { fill: rgba(217,210,192,.5); text-anchor: middle; font: 10px "IBM Plex Mono", ui-monospace, monospace; }
.home-glyph { text-anchor: middle; font-size: 14px; }
.ic-muster { fill: var(--brass); stroke: var(--ink); stroke-width: 1; }
.ic-supply { fill: #8FA86B; stroke: var(--ink); stroke-width: 1; }
.ic-coin   { fill: #D9B65C; stroke: var(--ink); stroke-width: 1; }

@media (max-width: 900px) {
  body { grid-template-columns: 1fr; grid-template-rows: auto auto; }
  .side { border-left: none; border-top: 1px solid var(--hair); }
  .map-pane { max-height: 62vh; }
}
@media (prefers-reduced-motion: reduce) {
  .region { transition: none; }
}

/* ---- table mode ---- */
.game-body #turn-panel { margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--hair); min-height: 200px; }
.flash { background: #3a2020; border: 1px solid #c96a2b; color: #f0c9a8; padding: 8px 10px; border-radius: 4px; font-size: 13px; margin-bottom: 10px; }
.query-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.tab { font: 12px "IBM Plex Mono", monospace; background: var(--slate-2); color: var(--bone); border: 1px solid var(--hair); border-left-width: 3px; border-radius: 4px; padding: 5px 8px; cursor: pointer; }
.tab.on { background: var(--slate); }
.form-head { display: flex; align-items: center; gap: 8px; border-left: 3px solid var(--brass); padding: 6px 10px; margin-bottom: 10px; background: var(--slate-2); border-radius: 0 4px 4px 0; font-size: 14px; }
.fchip { width: 10px; height: 10px; border-radius: 2px; display: inline-block; flex: none; }
.btn-col { display: flex; flex-direction: column; gap: 6px; margin: 8px 0; }
.btn-col button, .toolbar button, .token, .order-row, #turn-panel > button, .move-card button, #load-box button {
  font: 13.5px system-ui, sans-serif; text-align: left; background: var(--slate-2); color: var(--bone);
  border: 1px solid var(--hair); border-radius: 4px; padding: 8px 10px; cursor: pointer;
}
.btn-col button:hover, .token:hover, .order-row:hover { border-color: var(--brass); }
button.primary { background: #3d3420; border-color: var(--brass); color: #f0e2b8; font-weight: 600; }
button.ghost { opacity: 0.75; }
button:disabled { opacity: 0.4; cursor: default; }
button.picking { border-color: var(--brass); box-shadow: 0 0 0 1px var(--brass); }
.order-rows { display: flex; flex-direction: column; gap: 4px; margin: 8px 0; }
.order-row { display: flex; justify-content: space-between; gap: 8px; width: 100%; }
.order-row .tok { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--brass); }
.token-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
.star-budget { font: 12px "IBM Plex Mono", monospace; color: var(--brass); }
.move-card { border: 1px solid var(--hair); border-radius: 6px; padding: 8px 10px; margin: 8px 0; font-size: 13.5px; }
.stepper { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 13px; }
.stepper button { padding: 2px 10px; }
.battle { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
.battle-side { border: 1px solid var(--hair); border-top: 3px solid var(--brass); border-radius: 6px; padding: 8px; text-align: center; font-size: 12.5px; }
.battle-side b { display: block; font: 700 26px "Big Shoulders Display", sans-serif; color: var(--brass); }
.battle-vs { font-size: 12px; color: var(--bone-dim); text-align: center; }
.victory { font: 600 20px "Big Shoulders Display", sans-serif; letter-spacing: .04em; border: 1px solid var(--brass); border-radius: 8px; padding: 16px; text-align: center; }
.victory span { display: block; font: 13px system-ui; color: var(--bone-dim); margin-top: 6px; }
#log-panel { margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--hair); }
#log-panel h3 { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--bone-dim); margin: 0 0 8px; }
#log { max-height: 200px; overflow-y: auto; font-size: 12.5px; color: var(--bone-dim); display: flex; flex-direction: column; gap: 3px; }
.toolbar { display: flex; gap: 6px; margin-top: 14px; flex-wrap: wrap; }
#load-box textarea { width: 100%; background: var(--slate-2); color: var(--bone); border: 1px solid var(--hair); border-radius: 4px; font: 12px monospace; margin: 8px 0 6px; }
.hidden { display: none; }
.footnote { font-size: 12px; margin-top: 14px; }
.footnote a { color: var(--bone-dim); }
.ov-order { fill: var(--ink-2); stroke-width: 2; }
.ov-order-txt { fill: var(--bone); text-anchor: middle; font: 600 9.5px "IBM Plex Mono", monospace; }
.ov-marker { stroke: var(--ink); stroke-width: 1; }
.ov-battle { fill: none; stroke: #c96a2b; stroke-width: 2.5; stroke-dasharray: 6 4; }

/* --- leader cards (M1.5a) --- */
.card-list { display: flex; flex-direction: column; gap: 6px; }
.card-opt { text-align: left; }
.card-chip { font-family: var(--mono, 'IBM Plex Mono', monospace); font-size: 13px; }
.card-chip b { color: var(--brass, #C9A84C); margin-right: 6px; }
.card-chip.ghost { opacity: .55; font-style: italic; }
.card-text { font-size: 11.5px; opacity: .8; margin: 2px 0 4px; line-height: 1.35; }
.battle-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 4px 0 8px; }
.stepper-row { display: flex; justify-content: space-between; align-items: center; margin: 4px 0; }

/* --- influence tracks panel (M2.a hotfix) --- */
#tracks-panel { margin: 8px 0 2px; display: grid; gap: 4px; }
.track-row { display: flex; align-items: center; gap: 4px; font-size: 12px; }
.track-name { width: 84px; opacity: .75; letter-spacing: .04em; font-size: 10.5px;
  text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-seat { border: 1px solid; border-radius: 4px; padding: 0 4px; line-height: 1.5;
  background: rgba(255,255,255,.04); }
.track-seat sup { font-size: 8px; letter-spacing: -1px; opacity: .85; }
.tok-dot { margin-left: 2px; font-size: 8px; vertical-align: 2px; color: #e8c15a; }

/* --- houses panel + active-decider spotlight (M2.b) --- */
#houses-panel { margin: 6px 0 2px; display: grid; gap: 3px; }
.house-row { display: flex; gap: 10px; align-items: baseline; font-size: 12px;
  border-left: 3px solid; padding: 1px 6px; opacity: .8; }
.house-row .house-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.house-active { opacity: 1; background: rgba(232,193,90,.10); box-shadow: inset 0 0 0 1px rgba(232,193,90,.25); }
.seat-active { box-shadow: 0 0 0 1px rgba(232,193,90,.6); }
.battle-score { font-size: 13px; margin: 2px 0 6px; }
.battle-score .dim { opacity: .55; font-size: 11px; }

/* --- map intel overlays (P2 batch, Jul 2026) --- */
.ov-neutral { fill: var(--ink-2); stroke: #9aa0ab; stroke-width: 2; }
.ov-focus  { fill-opacity: .13; stroke-width: 4; stroke-opacity: .95; pointer-events: none; }
.ov-target { fill: rgba(90,200,120,.07); stroke: #5ac878; stroke-width: 2.5; stroke-dasharray: 7 5; pointer-events: none; }
.ov-battle { fill: rgba(220,90,90,.08);  stroke: #dc5a5a; stroke-width: 2.5; stroke-dasharray: 2 4; pointer-events: none; }
[data-repick] { opacity: .8; font-size: 12px; margin: 2px 0 6px; }

#seed-line { margin-top: 6px; font-size: 11px; opacity: .45; cursor: pointer; user-select: none; }
#seed-line:hover { opacity: .8; text-decoration: underline; }

/* --- Clash of Kings (M2.c) --- */
.big-stepper { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
.big-stepper .bid-amt { font-size: 26px; min-width: 34px; text-align: center; color: var(--gold, #e8c15a); }
.big-stepper button { width: 40px; height: 36px; font-size: 18px; }
</style>

  <main class="map-pane">
    <svg id="map" aria-label="Campaign map"></svg>
  </main>
  <aside class="side">
    <header>
      <h1>Hegemon</h1>
      <p id="status-line"></p>
      <div id="tracks-panel"></div>
      <div id="houses-panel"></div>
    </header>
    <div class="field">
      <label for="theme-select">Theme pack</label>
      <select id="theme-select">
        <option value="core" selected>Core — The Sundered Realm</option>
        <option value="asoiaf">ASOIAF — The War of Five Kings</option>
        <option value="modern2026">2026 — The Concert of Powers</option>
      </select>
    </div>
    <section id="turn-panel"></section>
    <section id="log-panel">
      <h3>Chronicle</h3>
      <div id="log"></div>
    </section>
    <div class="toolbar">
      <button id="btn-new">New game</button>
      <button id="btn-undo">Undo</button>
      <button id="btn-save">Save</button>
      <button id="btn-episode" title="Export a labeled learning episode (transcript + outcome)">Episode</button>
      <button id="btn-load">Load</button>
    </div>
    <div id="load-box" class="hidden">
      <button id="btn-load-file">Load a save file…</button>
      <input type="file" id="load-file" accept="application/json,.json" hidden>
      <textarea id="load-text" rows="4" placeholder="…or paste a saved game here"></textarea>
      <button id="btn-load-confirm">Restore</button>
    </div>
    <div id="seed-line" title="Tap to start a seeded game"></div>

  </aside>
