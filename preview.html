/* HEGEMON map viewer — naval chart-room aesthetic.
   Palette: ink #0B111C · sea #14283C · slate #37424F · brass #C9A84C · bone #D9D2C0 */

:root {
  --ink: #0B111C;
  --ink-2: #101a29;
  --sea: #14283C;
  --slate: #37424F;
  --slate-2: #2C3641;
  --brass: #C9A84C;
  --bone: #D9D2C0;
  --bone-dim: #9aa3ad;
  --hair: rgba(217, 210, 192, 0.14);
}

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  background: var(--ink);
  color: var(--bone);
  font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
  display: grid;
  grid-template-columns: 1fr 340px;
  grid-template-rows: 100vh;
}

.map-pane { overflow: auto; background: radial-gradient(1200px 900px at 40% 30%, var(--ink-2), var(--ink)); }
#map { display: block; width: min(100%, 980px); margin: 0 auto; height: auto; }

.side {
  border-left: 1px solid var(--hair);
  background: var(--ink-2);
  padding: 20px 22px;
  overflow-y: auto;
}

header h1 {
  font-family: "Big Shoulders Display", "Arial Narrow", system-ui, sans-serif;
  font-weight: 700; letter-spacing: 0.12em; font-size: 26px;
  margin: 0; color: var(--brass); text-transform: uppercase;
}
#theme-title { margin: 2px 0 16px; color: var(--bone-dim); font-size: 13px; letter-spacing: 0.06em; }

.field label { display: block; font-size: 11px; letter-spacing: .14em; text-transform: uppercase; color: var(--bone-dim); margin-bottom: 6px; }
select {
  width: 100%; padding: 9px 10px; border-radius: 4px;
  background: var(--slate-2); color: var(--bone);
  border: 1px solid var(--hair); font: inherit;
}
select:focus-visible, .chip:focus-visible, .region:focus-visible { outline: 2px solid var(--brass); outline-offset: 2px; }

#inspector { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--hair); min-height: 220px; }
.hint { color: var(--bone-dim); font-size: 13.5px; }
.insp-head h2 { margin: 4px 0 10px; font-family: "Big Shoulders Display", "Arial Narrow", sans-serif; font-size: 24px; letter-spacing: .04em; }
.idtag-ui, .draft-flag { font-family: "IBM Plex Mono", ui-monospace, monospace; font-size: 11px; color: var(--brass); letter-spacing: .08em; }
.draft-flag { color: #c96a2b; text-transform: uppercase; }
dl { display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; margin: 0 0 14px; font-size: 13.5px; }
dt { color: var(--bone-dim); }
dd { margin: 0; }
#inspector h3 { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--bone-dim); margin: 12px 0 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font: 12px/1 "IBM Plex Mono", ui-monospace, monospace; color: var(--bone);
  background: var(--slate-2); border: 1px solid var(--hair); border-radius: 999px;
  padding: 6px 10px; cursor: pointer;
}
.chip:hover { border-color: var(--brass); }

#legend { margin-top: 22px; padding-top: 18px; border-top: 1px solid var(--hair); font-size: 13px; }
.legend-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.swatch { width: 12px; height: 12px; border-radius: 2px; flex: none; }
.legend-home { margin-left: auto; color: var(--bone-dim); font-size: 12px; }

/* ---- SVG ---- */
.graticule line { stroke: var(--hair); stroke-width: 0.5; }
.edge-land { stroke: rgba(217,210,192,.28); stroke-width: 1.4; }
.edge-sea  { stroke: rgba(120,170,210,.30); stroke-width: 1.4; stroke-dasharray: 4 5; }
.edge-hl   { stroke: var(--brass); stroke-width: 2.4; stroke-dasharray: none; }

.region { cursor: pointer; transition: opacity .12s ease; }
.region.dim { opacity: 0.28; }
.land-hex { fill: var(--slate); stroke: rgba(217,210,192,.45); stroke-width: 1.6; }
.sea-outer { fill: var(--sea); stroke: rgba(120,170,210,.5); stroke-width: 1.2; stroke-dasharray: 3 4; }
.sea-inner { fill: none; stroke: rgba(120,170,210,.28); stroke-width: 1; }
.port-diamond { fill: var(--ink-2); stroke: var(--brass); stroke-width: 1.4; }

.region.hl .shape, .region.selected .shape { stroke: var(--brass); stroke-width: 3; }
.region.adj .shape { stroke: #E8DCA8; stroke-width: 2.4; }

.label {
  fill: var(--bone); text-anchor: middle;
  font: 600 15px "Big Shoulders Display", "Arial Narrow", sans-serif;
  letter-spacing: .05em; paint-order: stroke; stroke: var(--ink); stroke-width: 3px;
}
.maritime .label { fill: #9CC3DE; font-weight: 500; font-style: italic; }
.idtag { fill: rgba(217,210,192,.5); text-anchor: middle; font: 10px "IBM Plex Mono", ui-monospace, monospace; }
.home-glyph { text-anchor: middle; font-size: 14px; }
.ic-muster { fill: var(--brass); stroke: var(--ink); stroke-width: 1; }
.ic-supply { fill: #8FA86B; stroke: var(--ink); stroke-width: 1; }
.ic-coin   { fill: #D9B65C; stroke: var(--ink); stroke-width: 1; }

@media (max-width: 900px) {
  body { grid-template-columns: 1fr; grid-template-rows: auto auto; }
  .side { border-left: none; border-top: 1px solid var(--hair); }
  .map-pane { max-height: 62vh; }
}
@media (prefers-reduced-motion: reduce) {
  .region { transition: none; }
}

function hexPath(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const a = (Math.PI / 3) * i - Math.PI / 6;
    pts.push(`${(cx + r * Math.cos(a)).toFixed(1)},${(cy + r * Math.sin(a)).toFixed(1)}`);
  }
  return pts.join(' ');
}

function iconRow(g, region, cx, cy) {
  const marks = [];
  for (let i = 0; i < region.muster; i++) marks.push('muster');
  for (let i = 0; i < (region.supply || 0); i++) marks.push('supply');
  for (let i = 0; i < (region.coin || 0); i++) marks.push('coin');
  const total = marks.length;
  if (!total) return;
  const step = 16, x0 = cx - ((total - 1) * step) / 2;
  marks.forEach((m, i) => {
    const x = x0 + i * step;
    if (m === 'muster') g.appendChild(svgEl('rect', { x: x - 5.5, y: cy - 5.5, width: 11, height: 11, class: 'ic-muster' }));
    else if (m === 'supply') g.appendChild(svgEl('rect', { x: x - 5, y: cy - 6, width: 10, height: 12, rx: 3, class: 'ic-supply' }));
    else g.appendChild(svgEl('circle', { cx: x, cy, r: 5.5, class: 'ic-coin' }));
  });
}

function renderMap(svg, theme, { onSelect } = {}) {
  svg.innerHTML = '';
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  const pos = Object.fromEntries(REGIONS.map(r => [r.id, r]));

  // chart graticule
  const grid = svgEl('g', { class: 'graticule' });
  for (let x = 100; x < W; x += 100) grid.appendChild(svgEl('line', { x1: x, y1: 0, x2: x, y2: H }));
  for (let y = 100; y < H; y += 100) grid.appendChild(svgEl('line', { x1: 0, y1: y, x2: W, y2: y }));
  svg.appendChild(grid);

  // edges
  const edges = svgEl('g', { class: 'edges' });
  for (const [a, b] of EDGES) {
    const A = pos[a], B = pos[b];
    if (!A || !B) continue;
    const sea = a.startsWith('S') || b.startsWith('S');
    edges.appendChild(svgEl('line', {
      x1: A.x, y1: A.y, x2: B.x, y2: B.y,
      class: sea ? 'edge edge-sea' : 'edge edge-land',
      'data-a': a, 'data-b': b,
    }));
  }
  svg.appendChild(edges);

  const nodes = svgEl('g', { class: 'nodes' });
  svg.appendChild(nodes);

  for (const r of REGIONS) {
    const g = svgEl('g', { class: `region ${r.kind}`, 'data-id': r.id, tabindex: 0, role: 'button' });
    const name = theme.regions[r.id] || r.id;

    if (r.kind === 'maritime') {
      g.appendChild(svgEl('circle', { cx: r.x, cy: r.y, r: 42, class: 'shape sea-outer' }));
      g.appendChild(svgEl('circle', { cx: r.x, cy: r.y, r: 32, class: 'shape sea-inner' }));
    } else {
      const home = r.home ? factionById[r.home] : null;
      const poly = svgEl('polygon', { points: hexPath(r.x, r.y, 46), class: 'shape land-hex' });
      if (home) poly.style.stroke = home.color;
      g.appendChild(poly);
      if (home) {
        g.appendChild(svgEl('circle', { cx: r.x, cy: r.y - 16, r: 13, class: 'home-seal', style: `fill:${home.color}` }));
        const glyph = svgEl('text', { x: r.x, y: r.y - 11.5, class: 'home-glyph' });
        glyph.textContent = theme.factions[r.home]?.glyph || '●';
        g.appendChild(glyph);
      }
      iconRow(g, r, r.x, r.y + (home ? 14 : 2));
    }

    const label = svgEl('text', { x: r.x, y: r.y + (r.kind === 'maritime' ? 58 : 66), class: 'label' });
    label.textContent = name;
    g.appendChild(label);

    const idTag = svgEl('text', { x: r.x, y: r.y + (r.kind === 'maritime' ? 4 : (r.home ? 34 : 24)), class: 'idtag' });
    idTag.textContent = r.id;
    g.appendChild(idTag);

    g.addEventListener('click', () => onSelect?.(r.id));
    g.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onSelect?.(r.id); } });
    g.addEventListener('mouseenter', () => highlight(svg, r.id, true));
    g.addEventListener('mouseleave', () => highlight(svg, r.id, false));
    g.addEventListener('focus', () => highlight(svg, r.id, true));
    g.addEventListener('blur', () => highlight(svg, r.id, false));
    nodes.appendChild(g);
  }

  // ports as diamonds on the land↔sea midpoint
  for (const p of PORTS) {
    const A = pos[p.landId], B = pos[p.seaId];
    const mx = (A.x + B.x) / 2, my = (A.y + B.y) / 2;
    const g = svgEl('g', { class: 'region port', 'data-id': p.id, tabindex: 0, role: 'button' });
    g.appendChild(svgEl('rect', { x: mx - 9, y: my - 9, width: 18, height: 18, class: 'shape port-diamond', transform: `rotate(45 ${mx} ${my})` }));
    g.addEventListener('click', () => onSelect?.(p.id));
    g.addEventListener('mouseenter', () => highlight(svg, p.id, true));
    g.addEventListener('mouseleave', () => highlight(svg, p.id, false));
    nodes.appendChild(g);
  }
}

function markSelected(svg, id) {
  svg.querySelectorAll('.region.selected').forEach(el => el.classList.remove('selected'));
  if (id) svg.querySelector(`.region[data-id="${id}"]`)?.classList.add('selected');
}

function highlight(svg, id, on) {
  const neighbors = ADJ[id] || new Set();
  svg.querySelectorAll('.region').forEach(el => {
    const rid = el.dataset.id;
    el.classList.toggle('hl', on && rid === id);
    el.classList.toggle('adj', on && neighbors.has(rid));
    el.classList.toggle('dim', on && rid !== id && !neighbors.has(rid));
  });
  svg.querySelectorAll('.edge').forEach(el => {
    el.classList.toggle('edge-hl', on && (el.dataset.a === id || el.dataset.b === id));
  });
}

(() => {

const THEMES = { core: THEME_CORE, asoiaf: THEME_ASOIAF };
const ADJ = buildAdjacency();
const byId = Object.fromEntries([...REGIONS, ...PORTS].map(r => [r.id, r]));

let theme = THEME_CORE;
let selectedId = null;

const $ = s => document.querySelector(s);
const svg = $('#map');

function portName(p) {
  return `${theme.terms.port} of ${theme.regions[p.landId]}`;
}
function regionName(id) {
  const r = byId[id];
  return r.kind === 'port' ? portName(r) : (theme.regions[id] || id);
}

function renderInspector() {
  const box = $('#inspector');
  if (!selectedId) {
    box.innerHTML = `<p class="hint">Select a region to inspect it. Hovering highlights its neighbors — use this to validate adjacency against the reference board.</p>`;
    return;
  }
  const r = byId[selectedId];
  const t = theme.terms;
  const rows = [];
  const kindLabel = r.kind === 'land' ? t.land : r.kind === 'maritime' ? t.maritime : t.port;
  rows.push(['Kind', kindLabel]);
  if (r.kind === 'land') {
    rows.push(['Muster', r.muster === 2 ? t.citadel : r.muster === 1 ? t.fort : '—']);
    rows.push(['Supply', r.supply || 0]);
    rows.push(['Coin', r.coin || 0]);
    if (r.home) rows.push([t.faction, `${theme.factions[r.home].glyph} ${theme.factions[r.home].name}`]);
    if (r.garrison) rows.push(['Garrison', r.garrison]);
  }
  if (r.kind === 'port') {
    rows.push(['Attached to', `${regionName(r.landId)} / ${regionName(r.seaId)}`]);
  }
  const neighbors = [...(ADJ[selectedId] || [])].sort().map(id =>
    `<button class="chip" data-goto="${id}">${id} · ${regionName(id)}</button>`).join('');
  box.innerHTML = `
    <div class="insp-head"><span class="idtag-ui">${r.id}</span><h2>${regionName(r.id)}</h2></div>
    <dl>${rows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>
    <h3>Adjacent <span class="draft-flag">draft — verify</span></h3>
    <div class="chips">${neighbors || '<em>none</em>'}</div>`;
  box.querySelectorAll('[data-goto]').forEach(b =>
    b.addEventListener('click', () => select(b.dataset.goto)));
}

function renderLegend() {
  $('#legend').innerHTML = FACTIONS.map(f => {
    const tf = theme.factions[f.id];
    return `<div class="legend-row"><span class="swatch" style="background:${f.color}"></span>
      <span class="legend-glyph">${tf.glyph}</span> ${tf.name}
      <span class="legend-home">${regionName(f.homeRegionId)}</span></div>`;
  }).join('');
}

function renderAll() {
  document.title = `HEGEMON — ${theme.title}`;
  $('#theme-title').textContent = theme.title;
  renderMap(svg, theme, { onSelect: select });
  markSelected(svg, selectedId);
  renderInspector();
  renderLegend();
}

function select(id) {
  selectedId = id === selectedId ? null : id;
  markSelected(svg, selectedId);
  renderInspector();
}

$('#theme-select').addEventListener('change', e => {
  theme = THEMES[e.target.value];
  renderAll();
});

renderAll();
})();
